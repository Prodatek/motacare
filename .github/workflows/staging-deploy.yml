name: Deploy to Staging

# ============================================================
# Triggers on push to the staging branch.
# Full pipeline: test → build → push to GHCR → deploy to VM
# ============================================================

on:
  push:
    branches:
      - staging
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy only)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  # GitHub Container Registry image prefix
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/motacare

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: TEST GATE
  # No deployment without passing tests.
  # Can be skipped for emergency deploys via workflow_dispatch.
  # ──────────────────────────────────────────────────────────
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != true }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/shared-utils

      - name: Run all tests
        run: npm run test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-minimum-32-characters-long
          VEHICLE_HASH_SECRET: test-hash-secret-minimum-32-chars-long
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          AUTH_SERVICE_URL: http://localhost:3001
          VEHICLE_SERVICE_URL: http://localhost:3002

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD & PUSH DOCKER IMAGES
  # Builds all service images and pushes to GHCR.
  # Tagged with both the git SHA (immutable) and 'staging' (mutable).
  # The SHA tag is what gets deployed — guarantees exact version.
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    # Run even if test job was skipped (emergency deploy)
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    strategy:
      matrix:
        include:
          - service: auth-service
            dockerfile: infra/docker/auth-service.Dockerfile
          - service: vehicle-service
            dockerfile: infra/docker/vehicle-service.Dockerfile
          - service: inspection-service
            dockerfile: infra/docker/inspection-service.Dockerfile
          - service: api-gateway
            dockerfile: infra/docker/api-gateway.Dockerfile
          - service: web
            dockerfile: infra/docker/web.Dockerfile
          - service: fix-jobs
            dockerfile: infra/docker/fix-jobs.Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            # Immutable tag: exact git commit SHA
            type=sha,prefix=sha-,format=short
            # Mutable tag: always points to latest staging build
            type=raw,value=staging
            # Branch name tag
            type=ref,event=branch

      - name: Build and push — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache — speeds up repeated builds
          cache-from: type=gha,scope=${{ matrix.service }}-staging
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-staging
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ──────────────────────────────────────────────────────────
  # JOB 3: DEPLOY TO STAGING VM
  # SSHs into the staging server, pulls new images, restarts.
  # Uses the exact SHA tag to guarantee we deploy what we built.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.result == 'success'
    environment:
      name: staging
      url: https://staging.motacare.app

    steps:
      - name: Checkout code (for deploy scripts)
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          envs: IMAGE_PREFIX,GITHUB_SHA
          script: |
            set -e  # Exit immediately on any error

            echo "🚀 Starting deployment of sha-${{ steps.vars.outputs.sha_short }}"

            # Navigate to app directory on the staging server
            cd /opt/motacare

            # Pull the latest docker-compose files from the deployed repo
            git fetch origin staging
            git reset --hard origin/staging

            # Export the image tag so docker-compose uses the right version
            export IMAGE_TAG=sha-${{ steps.vars.outputs.sha_short }}
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}

            # Log in to GHCR on the server
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images (parallel pull)
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml pull

            # Rolling restart — stops old, starts new with zero-downtime approach
            # Services restart one at a time respecting depends_on order
            docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d \
              --remove-orphans \
              --timeout 60

            echo "✅ Containers restarted"

            # Run healthcheck script
            chmod +x ./infra/scripts/healthcheck.sh
            ./infra/scripts/healthcheck.sh

            echo "🎉 Deployment complete — sha-${{ steps.vars.outputs.sha_short }}"

  # ──────────────────────────────────────────────────────────
  # JOB 4: NOTIFY
  # Posts deployment result to Slack (or just GitHub summary)
  # Runs regardless of deploy success/failure
  # ──────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Write deployment summary
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          ICON=$([ "$DEPLOY_STATUS" == "success" ] && echo "🟢" || echo "🔴")

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ${ICON} Staging Deployment — \`sha-${{ steps.vars.outputs.sha_short }}\`

          | Stage | Result |
          |---|---|
          | Tests | ${{ needs.test.result }} |
          | Build & Push | ${{ needs.build-and-push.result }} |
          | Deploy | ${{ needs.deploy.result }} |

          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Author:** ${{ github.actor }}
          **Message:** ${{ github.event.head_commit.message }}

          $( [ "$DEPLOY_STATUS" == "success" ] && echo "**Staging URL:** https://staging.motacare.app" || echo "⚠️ Deployment failed. Check logs above." )
          EOF

      - name: Notify Slack (optional)
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ needs.deploy.result == 'success' && '🟢' || '🔴' }} *Motacare Staging Deploy* — `sha-${{ steps.vars.outputs.sha_short }}`\n${{ needs.deploy.result == 'success' && 'Deployment successful ✅' || 'Deployment failed ❌ — check GitHub Actions' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.deploy.result == 'success' && '🟢' || '🔴' }} *Motacare Staging* — `sha-${{ steps.vars.outputs.sha_short }}`\nBy *${{ github.actor }}* — ${{ github.event.head_commit.message }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK