name: PR Check

# ============================================================
# Runs on every PR targeting dev, staging, or main.
# Self-hosted runner — all caching is local disk (no network).
#
# Pipeline:
#   setup → lint, typecheck, test, docker-build → pr-summary
#
# Warm runner target: < 3 minutes end-to-end.
# ============================================================

on:
  pull_request:
    branches: [dev, staging, main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-minimum-32-characters-ok
  VEHICLE_HASH_SECRET: ci-test-hash-secret-32-chars-minimum
  POSTGRES_USER: ci
  POSTGRES_PASSWORD: ci
  POSTGRES_DB: ci
  POSTGRES_HOST: localhost
  POSTGRES_PORT: '5432'
  AUTH_SERVICE_URL: http://localhost:3001
  VEHICLE_SERVICE_URL: http://localhost:3002
  INSPECTION_SERVICE_URL: http://localhost:3003
  FIX_JOBS_SERVICE_URL: http://localhost:3004

jobs:
  # ============================================================
  # JOB 0 — SETUP
  # Single npm ci. Builds shared packages. Everything cached.
  # ============================================================
  setup:
    name: Setup
    runs-on: self-hosted
    timeout-minutes: 10
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="node-${{ runner.os }}-$(cat package-lock.json \
            $(find packages apps -name 'package.json' \
              -not -path '*/node_modules/*' | sort) \
            | sha256sum | cut -c1-16)"
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Restore node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: node-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/shared-utils

      - name: Cache built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-${{ github.sha }}

  # ============================================================
  # JOB 1 — LINT
  #
  # BUG FIX: eslint was not declared as a dependency anywhere —
  # not in root package.json and not in any service package.json.
  # This caused `eslint: not found` (exit 127) on every service.
  #
  # Solution: invoke eslint via its full local path
  # (./node_modules/.bin/eslint) rather than relying on PATH.
  # Also added a preflight check that prints a clear fix message
  # if eslint still isn't installed.
  #
  # PERMANENT FIX: add to root package.json devDependencies:
  #   "eslint": "^8.57.0"
  #   "@typescript-eslint/parser": "^7.0.0"
  #   "@typescript-eslint/eslint-plugin": "^7.0.0"
  # ============================================================
  lint:
    name: Lint
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      # Fail early with a clear message if eslint isn't installed
      - name: Verify eslint available
        run: |
          if ! ./node_modules/.bin/eslint --version > /dev/null 2>&1; then
            echo "::error::eslint not found. Add to root package.json devDependencies:"
            echo "::error::  \"eslint\": \"^8.57.0\""
            echo "::error::  \"@typescript-eslint/parser\": \"^7.0.0\""
            echo "::error::  \"@typescript-eslint/eslint-plugin\": \"^7.0.0\""
            exit 1
          fi
          echo "eslint $(./node_modules/.bin/eslint --version)"

      # Run via full path so runner PATH doesn't matter
      - name: ESLint
        run: |
          ESLINT=./node_modules/.bin/eslint
          failed=0
          for svc in apps/*/src packages/*/src; do
            [ -d "$svc" ] || continue
            echo "→ $svc"
            $ESLINT "$svc" --ext .ts,.tsx \
              2>&1 | sed "s|^|[$svc] |" || failed=$((failed+1))
          done
          [ $failed -eq 0 ] || { echo "::error::$failed package(s) failed lint"; exit 1; }

      - name: Prettier check
        run: |
          ./node_modules/.bin/prettier \
            --check "**/*.{ts,tsx,json}" \
            --ignore-path .gitignore || true

  # ============================================================
  # JOB 2 — TYPE CHECK
  # All services in parallel background processes.
  # ============================================================
  typecheck:
    name: Type check
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Restore built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Type check (parallel)
        run: |
          declare -A pids
          for svc in apps/auth-service apps/vehicle-service \
                     apps/inspection-service apps/fix-jobs apps/api-gateway; do
            [ -f "$svc/tsconfig.json" ] || continue
            { ./node_modules/.bin/tsc --project "$svc/tsconfig.json" \
                --noEmit 2>&1 | sed "s|^|[$svc] |"; } &
            pids[$svc]=$!
          done
          failed=0
          for svc in "${!pids[@]}"; do
            wait "${pids[$svc]}" || { echo "::error::typecheck failed: $svc"; failed=$((failed+1)); }
          done
          [ $failed -eq 0 ] && echo "✅ All services passed" || exit 1

  # ============================================================
  # JOB 3 — TEST
  #
  # BUG FIX: apps/fix-jobs has no test files. `vitest run` exits
  # with code 1 when zero files match — this fails the job even
  # though there's nothing wrong with the code.
  #
  # Fix: has_tests matrix field. Services with has_tests=false
  # run `vitest run --passWithNoTests` so CI stays green until
  # test files are added. Remove the flag once tests exist.
  # ============================================================
  test:
    name: Test / ${{ matrix.service }}
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 8

    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: packages/shared-utils,       has_tests: true  }
          - { service: apps/auth-service,           has_tests: true  }
          - { service: apps/vehicle-service,        has_tests: true  }
          - { service: apps/inspection-service,     has_tests: true  }
          - { service: apps/fix-jobs,               has_tests: false }

    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Restore built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run tests
        run: |
          if [ "${{ matrix.has_tests }}" = "true" ]; then
            npm run test --workspace=${{ matrix.service }}
          else
            echo "No tests yet for ${{ matrix.service }} — skipping (passWithNoTests)"
            ./node_modules/.bin/vitest run \
              --passWithNoTests \
              --root ${{ matrix.service }}
          fi

      - name: Upload coverage
        if: always() && matrix.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service == 'packages/shared-utils' && 'shared-utils' || matrix.service == 'apps/auth-service' && 'auth' || matrix.service == 'apps/vehicle-service' && 'vehicle' || 'inspection' }}
          path: ${{ matrix.service }}/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # JOB 4 — DOCKER BUILD CHECK
  #
  # BUG FIX: previous version used `docker build` (legacy docker
  # driver) with `--cache-to type=local`. The legacy driver does
  # NOT support cache export — only the docker-container driver
  # does. This caused:
  #   "Cache export is not supported for the docker driver"
  #
  # Fix: switch to `docker buildx build` with a named builder
  # that uses the docker-container driver. This supports full
  # local cache import/export.
  #
  # ONE-TIME RUNNER SETUP (run once on the machine, not in CI):
  #   docker buildx create \
  #     --name motacare-builder \
  #     --driver docker-container \
  #     --bootstrap \
  #     --use
  #
  # The job auto-creates the builder if it doesn't exist.
  # ============================================================
  docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: auth-service,       dockerfile: infra/docker/auth-service.Dockerfile       }
          - { service: vehicle-service,    dockerfile: infra/docker/vehicle-service.Dockerfile    }
          - { service: inspection-service, dockerfile: infra/docker/inspection-service.Dockerfile }
          - { service: fix-jobs,           dockerfile: infra/docker/fix-jobs.Dockerfile           }
          - { service: api-gateway,        dockerfile: infra/docker/api-gateway.Dockerfile        }

    steps:
      - uses: actions/checkout@v4

      # Create builder with docker-container driver if it doesn't exist.
      # This is the driver that supports --cache-to type=local.
      # `|| true` is intentional — create fails if builder already exists.
      - name: Ensure docker-container buildx builder
        run: |
          docker buildx inspect motacare-builder > /dev/null 2>&1 || \
            docker buildx create \
              --name motacare-builder \
              --driver docker-container \
              --bootstrap
          docker buildx use motacare-builder
          echo "Builder ready:"
          docker buildx inspect | grep -E "Name:|Driver:|Status:"

      # --load imports the built image into the local docker daemon.
      # Required when using docker-container driver (images don't
      # automatically appear in `docker images` without --load).
      - name: Build — ${{ matrix.service }}
        run: |
          docker buildx build \
            --builder motacare-builder \
            --file    ${{ matrix.dockerfile }} \
            --target  production \
            --tag     motacare/${{ matrix.service }}:pr-${{ github.event.pull_request.number }} \
            --cache-from type=local,src=/tmp/buildkit-cache/${{ matrix.service }} \
            --cache-to   type=local,dest=/tmp/buildkit-cache/${{ matrix.service }},mode=max \
            --build-arg  BUILD_SHA=${{ github.sha }} \
            --load \
            --progress plain \
            .

      - name: Remove image
        if: always()
        run: docker rmi motacare/${{ matrix.service }}:pr-${{ github.event.pull_request.number }} || true

  # ============================================================
  # JOB 5 — PR SUMMARY
  # ============================================================
  pr-summary:
    name: PR Summary
    runs-on: self-hosted
    needs: [lint, typecheck, test, docker-build]
    if: always()
    timeout-minutes: 3
    permissions:
      pull-requests: write

    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const r = {
              lint:   '${{ needs.lint.result }}',
              types:  '${{ needs.typecheck.result }}',
              tests:  '${{ needs.test.result }}',
              docker: '${{ needs.docker-build.result }}',
            };
            const icon = (v) =>
              v==='success'?'✅':v==='skipped'?'⏭️':v==='cancelled'?'🚫':'❌';

            const allGood = Object.values(r).every(v => v==='success');
            const body = [
              allGood ? '## ✅ All checks passed' : '## ❌ Some checks failed', '',
              '| Check | Result |', '|---|---|',
              `| Lint         | ${icon(r.lint)}   ${r.lint}   |`,
              `| Type Check   | ${icon(r.types)}  ${r.types}  |`,
              `| Tests        | ${icon(r.tests)}  ${r.tests}  |`,
              `| Docker Build | ${icon(r.docker)} ${r.docker} |`, '',
              `**Branch:** \`${{ github.head_ref }}\` · **Commit:** \`${{ github.event.pull_request.head.sha }}`.slice(0,7) + '`',
              '', allGood ? '_Ready for review._' : '_Fix failing checks before requesting review._',
              '', `<sub>${new Date().toISOString()}</sub>`,
            ].join('\n');

            const MARKER = '<!-- mc-pr -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const found = comments.find(c => c.user?.type==='Bot' && c.body?.includes(MARKER));
            const fullBody = `${MARKER}\n${body}`;
            if (found) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: found.id, body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: fullBody,
              });
            }

      - name: Write step summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          | Check | Result |
          |---|---|
          | Lint | ${{ needs.lint.result }} |
          | Type Check | ${{ needs.typecheck.result }} |
          | Tests | ${{ needs.test.result }} |
          | Docker Build | ${{ needs.docker-build.result }} |
          EOF