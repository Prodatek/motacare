name: PR Check

# ============================================================
# Runs on every pull request targeting dev, staging, or main.
# Uses a self-hosted runner — caching is on local disk, not
# GitHub's cache service, so hits are near-instant.
#
# Pipeline order (all jobs run in parallel unless noted):
#   shared-packages → lint, typecheck, test, docker-build
#   All four → pr-summary
#
# Total wall-clock target on a warm runner: < 3 minutes.
# ============================================================

on:
  pull_request:
    branches: [dev, staging, main]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR on new push
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ============================================================
# ENVIRONMENT — shared across all jobs
# ============================================================
env:
  NODE_VERSION: '20'
  # Dummy values so env-validation doesn't exit(1) during tests
  JWT_SECRET: ci-test-secret-minimum-32-characters-ok
  VEHICLE_HASH_SECRET: ci-test-hash-secret-32-chars-minimum
  POSTGRES_USER: ci
  POSTGRES_PASSWORD: ci
  POSTGRES_DB: ci
  POSTGRES_HOST: localhost
  POSTGRES_PORT: '5432'
  AUTH_SERVICE_URL: http://localhost:3001
  VEHICLE_SERVICE_URL: http://localhost:3002
  INSPECTION_SERVICE_URL: http://localhost:3003
  FIX_JOBS_SERVICE_URL: http://localhost:3004
  NODE_ENV: test

# ============================================================
# JOB 0 — BUILD SHARED PACKAGES
# Everything else depends on shared-types and shared-utils
# being compiled first. One install, one build, shared via cache.
# ============================================================
jobs:
  shared-packages:
    name: Build shared packages
    runs-on: self-hosted
    timeout-minutes: 8

    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Deterministic cache key: hash of every package.json + lock file
      - name: Compute cache key
        id: cache-key
        run: |
          KEY="node-${{ runner.os }}-$(cat package-lock.json packages/*/package.json apps/*/package.json | sha256sum | cut -c1-16)"
          echo "key=$KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $KEY"

      # Restore node_modules from local runner disk cache.
      # On self-hosted runners this is a local directory — no network I/O.
      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            node-${{ runner.os }}-

      - name: Install dependencies (cache miss only)
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      # Build shared packages — downstream jobs need the compiled dist/
      - name: Build shared-types
        run: npm run build --workspace=packages/shared-types

      - name: Build shared-utils
        run: npm run build --workspace=packages/shared-utils

      # Cache the built dist/ directories so downstream jobs don't rebuild
      - name: Cache built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-packages-${{ github.sha }}

  # ============================================================
  # JOB 1 — LINT
  # Fast — runs ESLint and Prettier check.
  # No DB, no build output needed beyond shared packages.
  # ============================================================
  lint:
    name: Lint
    runs-on: self-hosted
    needs: shared-packages
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.shared-packages.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "**/*.{ts,tsx,json}" --ignore-path .gitignore

  # ============================================================
  # JOB 2 — TYPE CHECK
  # tsc --noEmit on each service.
  # Needs built shared packages for path alias resolution.
  # ============================================================
  typecheck:
    name: Type check
    runs-on: self-hosted
    needs: shared-packages
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.shared-packages.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Restore built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-packages-${{ github.sha }}
          fail-on-cache-miss: true

      # Run all service typechecks in parallel using background processes
      # then wait for all of them — faster than sequential on a multi-core runner
      - name: Type check all services
        run: |
          set -e
          pids=()

          services=(
            "apps/auth-service"
            "apps/vehicle-service"
            "apps/inspection-service"
            "apps/fix-jobs"
            "apps/api-gateway"
          )

          for svc in "${services[@]}"; do
            if [ -f "$svc/tsconfig.json" ]; then
              echo "→ Checking $svc"
              npx tsc --project "$svc/tsconfig.json" --noEmit 2>&1 | sed "s/^/[$svc] /" &
              pids+=($!)
            fi
          done

          # Wait for all and collect exit codes
          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=$((failed + 1))
          done

          if [ $failed -gt 0 ]; then
            echo "::error::$failed service(s) failed type check"
            exit 1
          fi
          echo "✅ All services passed type check"

  # ============================================================
  # JOB 3 — TEST
  # Runs vitest for every service that has tests.
  # Parallelised with a matrix — each service gets its own job
  # so failures are isolated and reported individually.
  # ============================================================
  test:
    name: Test / ${{ matrix.service }}
    runs-on: self-hosted
    needs: shared-packages
    timeout-minutes: 8

    strategy:
      fail-fast: false   # Show ALL failing services, not just the first
      matrix:
        service:
          - packages/shared-utils
          - apps/auth-service
          - apps/vehicle-service
          - apps/inspection-service
          - apps/fix-jobs

    steps:
      - uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ needs.shared-packages.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Restore built packages
        uses: actions/cache@v4
        with:
          path: |
            packages/shared-types/dist
            packages/shared-utils/dist
          key: built-packages-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Run tests — ${{ matrix.service }}
        run: npm run test --workspace=${{ matrix.service }}

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service == 'packages/shared-utils' && 'shared-utils' || matrix.service == 'apps/auth-service' && 'auth' || matrix.service == 'apps/vehicle-service' && 'vehicle' || matrix.service == 'apps/inspection-service' && 'inspection' || 'fix-jobs' }}
          path: ${{ matrix.service }}/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # JOB 4 — DOCKER BUILD CHECK
  # Builds every service Dockerfile (production target, no push).
  # Uses local BuildKit cache on the self-hosted runner disk —
  # repeated builds only rebuild changed layers.
  # ============================================================
   docker-build:
    name: Docker / ${{ matrix.service }}
    runs-on: self-hosted
    needs: setup
    timeout-minutes: 15
 
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: auth-service,       dockerfile: infra/docker/auth-service.Dockerfile       }
          - { service: vehicle-service,    dockerfile: infra/docker/vehicle-service.Dockerfile    }
          - { service: inspection-service, dockerfile: infra/docker/inspection-service.Dockerfile }
          - { service: fix-jobs,           dockerfile: infra/docker/fix-jobs.Dockerfile           }
          - { service: api-gateway,        dockerfile: infra/docker/api-gateway.Dockerfile        }
 
    steps:
      - uses: actions/checkout@v4
 
      # Create builder with docker-container driver if it doesn't exist.
      # This is the driver that supports --cache-to type=local.
      # `|| true` is intentional — create fails if builder already exists.
      - name: Ensure docker-container buildx builder
        run: |
          docker buildx inspect motacare-builder > /dev/null 2>&1 || \
            docker buildx create \
              --name motacare-builder \
              --driver docker-container \
              --bootstrap
          docker buildx use motacare-builder
          echo "Builder ready:"
          docker buildx inspect | grep -E "Name:|Driver:|Status:"
 
      # --load imports the built image into the local docker daemon.
      # Required when using docker-container driver (images don't
      # automatically appear in `docker images` without --load).
      - name: Build — ${{ matrix.service }}
        run: |
          docker buildx build \
            --builder motacare-builder \
            --file    ${{ matrix.dockerfile }} \
            --target  production \
            --tag     motacare/${{ matrix.service }}:pr-${{ github.event.pull_request.number }} \
            --cache-from type=local,src=/tmp/buildkit-cache/${{ matrix.service }} \
            --cache-to   type=local,dest=/tmp/buildkit-cache/${{ matrix.service }},mode=max \
            --build-arg  BUILD_SHA=${{ github.sha }} \
            --load \
            --progress plain \
            .
 
      - name: Remove image
        if: always()
        run: docker rmi motacare/${{ matrix.service }}:pr-${{ github.event.pull_request.number }} || true
 
  # ============================================================
  # JOB 5 — PR SUMMARY
  # Posts a status table as a PR comment.
  # Updates the comment on each new push (no duplicate comments).
  # ============================================================
  pr-summary:
    name: PR Summary
    runs-on: self-hosted
    needs: [lint, typecheck, test, docker-build]
    if: always()
    timeout-minutes: 3

    permissions:
      pull-requests: write

    steps:
      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              lint:        '${{ needs.lint.result }}',
              typecheck:   '${{ needs.typecheck.result }}',
              test:        '${{ needs.test.result }}',
              dockerBuild: '${{ needs.docker-build.result }}',
            };

            const icon = (r) =>
              r === 'success'  ? '✅' :
              r === 'skipped'  ? '⏭️' :
              r === 'cancelled'? '🚫' : '❌';

            const allPassed = Object.values(results).every((r) => r === 'success');
            const anyCancelled = Object.values(results).some((r) => r === 'cancelled');

            const headline = allPassed
              ? '## ✅ All checks passed — ready for review'
              : anyCancelled
                ? '## 🚫 Checks cancelled'
                : '## ❌ Some checks failed';

            const sha    = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const actor  = '${{ github.actor }}';
            const branch = '${{ github.head_ref }}';

            const body = [
              headline,
              '',
              `| Check | Result |`,
              `|---|---|`,
              `| Lint | ${icon(results.lint)} ${results.lint} |`,
              `| Type Check | ${icon(results.typecheck)} ${results.typecheck} |`,
              `| Tests | ${icon(results.test)} ${results.test} |`,
              `| Docker Build | ${icon(results.dockerBuild)} ${results.dockerBuild} |`,
              '',
              `**Branch:** \`${branch}\` · **Commit:** \`${sha}\` · **By:** @${actor}`,
              '',
              allPassed
                ? '_This PR is ready for review._'
                : '_Fix the failing checks above before requesting review._',
              '',
              `<sub>Updated: ${new Date().toISOString()}</sub>`,
            ].join('\n');

            // Find an existing bot comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const MARKER = '<!-- motacare-pr-check -->';
            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes(MARKER),
            );

            const fullBody = `${MARKER}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         fullBody,
              });
            }

      # Also write a step summary so it's visible in the Actions UI
      # without needing to open the PR
      - name: Write job summary
        if: always()
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY