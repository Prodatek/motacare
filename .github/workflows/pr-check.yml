name: PR Check

# ============================================================
# Triggers on every pull request targeting dev or staging.
# This is the quality gate — PRs cannot be merged if this fails.
# ============================================================

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
    types: [opened, synchronize, reopened]

# Cancel any in-progress run for the same PR when a new commit is pushed
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: LINT
  # Catches code style issues before wasting time on tests
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter (all packages)
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,json,md}" --ignore-path .gitignore

  # ──────────────────────────────────────────────────────────
  # JOB 2: TYPE CHECK
  # TypeScript compilation without emitting files
  # Catches type errors across the whole monorepo
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages first (others depend on them)
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/shared-utils

      - name: Type check all services
        run: |
          npx tsc --project apps/auth-service/tsconfig.json --noEmit
          npx tsc --project apps/vehicle-service/tsconfig.json --noEmit
          npx tsc --project apps/inspection-service/tsconfig.json --noEmit

  # ──────────────────────────────────────────────────────────
  # JOB 3: TEST
  # Runs unit tests for all services in parallel
  # ──────────────────────────────────────────────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      # Run all services in parallel — fail-fast: false means
      # we see ALL failing services, not just the first one
      fail-fast: false
      matrix:
        service:
          - packages/shared-utils
          - apps/auth-service
          - apps/vehicle-service
          - apps/inspection-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages (required by services)
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/shared-utils

      - name: Run tests — ${{ matrix.service }}
        run: npm run test --workspace=${{ matrix.service }}
        env:
          NODE_ENV: test
          # Dummy env vars so config validation passes in test mode
          JWT_SECRET: test-secret-minimum-32-characters-long
          VEHICLE_HASH_SECRET: test-hash-secret-minimum-32-chars-long
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          AUTH_SERVICE_URL: http://localhost:3001
          VEHICLE_SERVICE_URL: http://localhost:3002

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service == 'packages/shared-utils' && 'shared-utils' || matrix.service == 'apps/auth-service' && 'auth' || matrix.service == 'apps/vehicle-service' && 'vehicle' || 'inspection' }}
          path: ${{ matrix.service }}/coverage
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # JOB 4: DOCKER BUILD CHECK
  # Builds all Docker images without pushing.
  # Confirms Dockerfiles work with current code before merge.
  # Uses GitHub Actions cache to speed up repeated builds.
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dockerfile: infra/docker/auth-service.Dockerfile
          - service: vehicle-service
            dockerfile: infra/docker/vehicle-service.Dockerfile
          - service: inspection-service
            dockerfile: infra/docker/inspection-service.Dockerfile
          - service: api-gateway
            dockerfile: infra/docker/api-gateway.Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push) — ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          push: false
          tags: motacare/${{ matrix.service }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────
  # JOB 5: PR SUMMARY
  # Posts a summary comment on the PR with job results
  # Runs after all jobs regardless of pass/fail
  # ──────────────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, docker-build]
    if: always()
    steps:
      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              lint: '${{ needs.lint.result }}',
              typecheck: '${{ needs.typecheck.result }}',
              test: '${{ needs.test.result }}',
              dockerBuild: '${{ needs.docker-build.result }}',
            };

            const icon = (result) => result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
            const allPassed = Object.values(jobs).every(r => r === 'success');

            const body = `## ${allPassed ? '✅ All checks passed' : '❌ Some checks failed'}

            | Check | Result |
            |---|---|
            | Lint | ${icon(jobs.lint)} ${jobs.lint} |
            | Type Check | ${icon(jobs.typecheck)} ${jobs.typecheck} |
            | Tests | ${icon(jobs.test)} ${jobs.test} |
            | Docker Build | ${icon(jobs.dockerBuild)} ${jobs.dockerBuild} |

            ${allPassed
              ? '_This PR is ready for review._'
              : '_Please fix the failing checks before requesting review._'}
            `;

            // Find existing bot comment and update it, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('All checks passed') || c.body?.includes('Some checks failed')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }